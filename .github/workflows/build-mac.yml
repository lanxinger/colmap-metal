name: COLMAP (Mac)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    types: [ assigned, opened, synchronize, reopened ]
  release:
    types: [ published, edited ]

jobs:
  build:
    name: macos-15 arm64 Release
    runs-on: macos-15

    env:
      COMPILER_CACHE_VERSION: 1
      COMPILER_CACHE_DIR: ${{ github.workspace }}/compiler-cache
      CCACHE_DIR: ${{ github.workspace }}/compiler-cache/ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      FETCHCONTENT_CACHE_VERSION: 1
      FETCHCONTENT_CACHE_DIR: ${{ github.workspace }}/build/_deps
      GLOG_v: 2
      GLOG_logtostderr: 1

    steps:
      - uses: actions/checkout@v7

      - name: Check code format
        run: |
          python3 -m venv .ci-format
          .ci-format/bin/pip install ruff==0.15.20 clang-format==22.1.5
          PATH="$PWD/.ci-format/bin:$PATH" ./scripts/format/c++.sh --all
          PATH="$PWD/.ci-format/bin:$PATH" ./scripts/format/python.sh --all
          git diff --name-only
          git diff --exit-code || (echo "Code formatting failed" && exit 1)

      - name: Restore compiler cache
        uses: actions/cache@v6
        id: cache-compiler
        with:
          key: v${{ env.COMPILER_CACHE_VERSION }}-macos-15-arm64-Release-${{ github.run_id }}-${{ github.run_number }}
          restore-keys: v${{ env.COMPILER_CACHE_VERSION }}-macos-15-arm64-Release
          path: ${{ env.COMPILER_CACHE_DIR }}

      - name: Restore FetchContent cache
        uses: actions/cache@v6
        id: cache-fetchcontent
        with:
          key: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-15-arm64-${{ hashFiles('cmake/FindDependencies.cmake', 'src/thirdparty/CMakeLists.txt') }}
          restore-keys: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-15-arm64-
          path: ${{ env.FETCHCONTENT_CACHE_DIR }}

      - name: Setup Mac
        run: |
          brew install \
            cmake \
            ninja \
            boost \
            eigen \
            openimageio \
            metis \
            glog \
            googletest \
            ceres-solver \
            glew \
            sqlite3 \
            ccache \
            libomp
          brew link --force libomp

      - name: Configure and build
        run: |
          cmake --version
          mkdir -p build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCCACHE_ENABLED=ON \
            -DCGAL_ENABLED=OFF \
            -DCUDA_ENABLED=OFF \
            -DDOWNLOAD_ENABLED=OFF \
            -DFETCH_ONNX=OFF \
            -DGUI_ENABLED=OFF \
            -DMETAL_ENABLED=ON \
            -DMVS_ENABLED=OFF \
            -DONNX_ENABLED=OFF \
            -DOPENGL_ENABLED=OFF \
            -DTESTS_ENABLED=ON \
            -DWERROR_ENABLED=ON \
            -DFETCHCONTENT_FULLY_DISCONNECTED=${{ steps.cache-fetchcontent.outputs.cache-hit == 'true' && 'ON' || 'OFF' }}
          ninja

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --no-tests=error

      - name: Cleanup compiler cache
        run: |
          set -x
          ccache --show-stats --verbose
          ccache --evict-older-than 1d
          ccache --show-stats --verbose
